<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>บันทึกมิเตอร์ไฟฟ้า</title>
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --surface2:  #21262d;
    --border:    #30363d;
    --accent:    #f0a500;
    --accent2:   #e05c00;
    --green:     #3fb950;
    --red:       #f85149;
    --text:      #e6edf3;
    --text2:     #8b949e;
    --text3:     #484f58;
    --radius:    10px;
    --font:      'IBM Plex Sans Thai', 'Sarabun', system-ui, sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; min-height: 100vh; }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 12px;
  }
  .header-icon {
    width: 36px; height: 36px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .header-title { font-size: 16px; font-weight: 700; letter-spacing: 0.01em; }
  .header-sub   { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .header-week  {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px; font-weight: 600; color: var(--accent);
    white-space: nowrap;
  }

  /* ── Loading / Error ── */
  .state-box {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; padding: 32px; text-align: center;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Week Selector ── */
  .week-selector {
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; align-items: center;
  }
  .week-selector label { font-size: 12px; color: var(--text2); white-space: nowrap; }
  .week-input {
    flex: 1;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius);
    padding: 8px 12px; font-size: 14px; font-family: var(--font);
    outline: none;
  }
  .week-input:focus { border-color: var(--accent); }
  .btn-load {
    padding: 8px 16px; border-radius: var(--radius);
    background: var(--accent); color: #000;
    border: none; font-weight: 700; font-size: 13px;
    cursor: pointer; white-space: nowrap;
    font-family: var(--font);
  }
  .btn-load:active { opacity: .8; }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex; gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat {
    flex: 1; background: var(--surface);
    padding: 8px 4px; text-align: center;
  }
  .stat-num  { font-size: 18px; font-weight: 700; }
  .stat-num.done   { color: var(--green); }
  .stat-num.remain { color: var(--accent); }
  .stat-num.total  { color: var(--text2); }
  .stat-label { font-size: 10px; color: var(--text3); margin-top: 2px; }

  /* ── Filter tabs ── */
  .filter-tabs {
    display: flex; overflow-x: auto; gap: 0;
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 8px;
    scrollbar-width: none;
  }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 10px 14px; font-size: 12px; font-weight: 600;
    color: var(--text2); white-space: nowrap; cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
    font-family: var(--font);
    background: none; border-top: none; border-left: none; border-right: none;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Meter list ── */
  .meter-list { flex: 1; overflow-y: auto; padding: 8px 12px 80px; }

  .meter-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color .15s;
  }
  .meter-card.has-value { border-left: 3px solid var(--green); }
  .meter-card.no-value  { border-left: 3px solid var(--border); }
  .meter-card.editing   { border-color: var(--accent); }

  .meter-head {
    padding: 10px 12px 8px;
    display: flex; align-items: flex-start; gap: 10px;
    cursor: pointer;
  }
  .meter-sort {
    width: 24px; height: 24px; border-radius: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--text3); flex-shrink: 0; margin-top: 1px;
  }
  .meter-info { flex: 1; min-width: 0; }
  .meter-name {
    font-size: 13px; font-weight: 600; line-height: 1.35;
    word-break: break-word;
  }
  .meter-id-tag {
    font-size: 10px; color: var(--text3); margin-top: 3px;
    font-family: 'IBM Plex Mono', monospace;
    word-break: break-all;
  }
  .meter-value-badge {
    flex-shrink: 0; text-align: right;
  }
  .badge {
    display: inline-block; padding: 3px 8px;
    border-radius: 12px; font-size: 11px; font-weight: 700;
  }
  .badge.filled  { background: rgba(63,185,80,.15); color: var(--green); }
  .badge.empty   { background: var(--surface2); color: var(--text3); }
  .badge.val     { font-size: 12px; color: var(--text); background: var(--surface2); }

  /* ── Input area ── */
  .meter-input-area {
    padding: 0 12px 12px;
    display: none;
    flex-direction: column; gap: 8px;
  }
  .meter-input-area.open { display: flex; }

  .input-row { display: flex; gap: 8px; }

  .value-input {
    flex: 1;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius);
    padding: 10px 12px; font-size: 18px; font-weight: 600;
    font-family: 'IBM Plex Mono', monospace;
    outline: none; min-width: 0;
  }
  .value-input:focus { border-color: var(--accent); }
  .value-input::placeholder { font-size: 14px; font-weight: 400; color: var(--text3); }

  .unit-toggle {
    display: flex; border-radius: var(--radius);
    overflow: hidden; border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .unit-btn {
    padding: 10px 14px; font-size: 13px; font-weight: 700;
    background: var(--bg); color: var(--text2);
    border: none; cursor: pointer; font-family: var(--font);
    transition: background .15s, color .15s;
  }
  .unit-btn.active {
    background: var(--accent); color: #000;
  }

  .extra-row { display: flex; gap: 8px; }
  .extra-input {
    flex: 1;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius);
    padding: 8px 10px; font-size: 13px;
    font-family: var(--font); outline: none;
  }
  .extra-input:focus { border-color: var(--border); }
  .extra-input::placeholder { color: var(--text3); }

  .btn-save {
    width: 100%; padding: 11px;
    background: var(--accent); color: #000;
    border: none; border-radius: var(--radius);
    font-size: 14px; font-weight: 700; font-family: var(--font);
    cursor: pointer; transition: opacity .15s;
  }
  .btn-save:active { opacity: .8; }
  .btn-save.saving { opacity: .6; pointer-events: none; }

  /* ── FAB Export ── */
  .fab {
    position: fixed; bottom: 20px; right: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000; border: none; border-radius: 28px;
    padding: 14px 22px; font-size: 14px; font-weight: 700;
    font-family: var(--font); cursor: pointer;
    box-shadow: 0 4px 20px rgba(240,165,0,.4);
    display: flex; align-items: center; gap: 8px;
    z-index: 200;
  }
  .fab:active { transform: scale(.97); }
  .fab.exporting { opacity: .7; pointer-events: none; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 20px; border-radius: 20px;
    font-size: 13px; font-weight: 600; z-index: 300;
    opacity: 0; transition: opacity .3s;
    pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error   { border-color: var(--red);   color: var(--red);   }

  /* ── Reader bar ── */
  .reader-bar {
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; align-items: center;
  }
  .reader-bar label { font-size: 12px; color: var(--text2); white-space: nowrap; }
  .reader-bar input {
    flex: 1;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius);
    padding: 7px 10px; font-size: 14px; font-family: var(--font); outline: none;
  }
  .reader-bar input:focus { border-color: var(--accent); }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;600;700&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">⚡</div>
    <div>
      <div class="header-title">บันทึกมิเตอร์ไฟฟ้า</div>
      <div class="header-sub">ไทรน้อย Energy Dashboard</div>
    </div>
    <div class="header-week" id="weekLabel">—</div>
  </div>

  <!-- Week Selector -->
  <div class="week-selector">
    <label>สัปดาห์</label>
    <input type="text" class="week-input" id="weekInput" placeholder="เช่น 2026-W23">
    <button class="btn-load" onclick="loadWeek()">โหลด</button>
  </div>

  <!-- Reader name -->
  <div class="reader-bar">
    <label>ผู้อ่าน</label>
    <input type="text" id="globalReader" placeholder="ชื่อช่าง / เจ้าหน้าที่"
      oninput="saveReaderName(this.value)">
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat">
      <div class="stat-num total" id="statTotal">0</div>
      <div class="stat-label">ทั้งหมด</div>
    </div>
    <div class="stat">
      <div class="stat-num done" id="statDone">0</div>
      <div class="stat-label">บันทึกแล้ว</div>
    </div>
    <div class="stat">
      <div class="stat-num remain" id="statRemain">0</div>
      <div class="stat-label">คงเหลือ</div>
    </div>
  </div>

  <!-- Filter tabs -->
  <div class="filter-tabs" id="filterTabs" style="display:none">
    <button class="tab active" onclick="setFilter('all',this)">ทั้งหมด</button>
    <button class="tab" onclick="setFilter('empty',this)">ยังไม่บันทึก</button>
    <button class="tab" onclick="setFilter('done',this)">บันทึกแล้ว</button>
  </div>

  <!-- Content -->
  <div id="content">
    <div class="state-box">
      <div style="font-size:48px">📋</div>
      <div style="color:var(--text2)">กรอกรหัสสัปดาห์แล้วกด <strong style="color:var(--accent)">โหลด</strong></div>
    </div>
  </div>

  <!-- FAB -->
  <button class="fab" id="fabExport" onclick="exportToGitHub()" style="display:none">
    <span>☁️</span> บันทึกลง GitHub
  </button>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ─────────────────────────────────────────────────
// เปลี่ยน URL นี้เป็น Apps Script Web App URL หลัง Deploy
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxzLQvR8Ra9fUNEnyGpCh18EHwsb4M_LcznKib0FO2mm1YEe8MiqlpdESnkTlQBTxzqkg/exec';

// ── State ──────────────────────────────────────────────────
let allRows   = [];
let weekId    = '';
let filter    = 'all';
let editingId = null;

// ── Init ───────────────────────────────────────────────────
window.onload = () => {
  // คำนวณ week ปัจจุบัน
  const w = getCurrentWeekId();
  document.getElementById('weekInput').value = w;

  // โหลดชื่อผู้อ่านจาก localStorage
  const saved = localStorage.getItem('readerName') || '';
  document.getElementById('globalReader').value = saved;
};

function saveReaderName(v) {
  localStorage.setItem('readerName', v);
}

function getCurrentWeekId() {
  const now  = new Date();
  const jan1 = new Date(now.getFullYear(), 0, 1);
  const week = Math.ceil(((now - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${now.getFullYear()}-W${String(week).padStart(2,'0')}`;
}

// ── Load week data ─────────────────────────────────────────
async function loadWeek() {
  weekId = document.getElementById('weekInput').value.trim();
  if (!weekId) return showToast('กรุณาระบุรหัสสัปดาห์', 'error');

  document.getElementById('weekLabel').textContent = weekId;
  showLoading();

  try {
    const res  = await fetch(`${APPS_SCRIPT_URL}?week_id=${weekId}`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'โหลดข้อมูลไม่สำเร็จ');

    allRows = data.rows;
    renderList();
    document.getElementById('statsBar').style.display  = 'flex';
    document.getElementById('filterTabs').style.display = 'flex';
    document.getElementById('fabExport').style.display  = 'flex';
  } catch(e) {
    showError(e.message);
  }
}

// ── Render ─────────────────────────────────────────────────
function renderList() {
  updateStats();

  const rows = allRows.filter(r => {
    if (filter === 'empty') return !r.raw_reading || r.raw_reading === '';
    if (filter === 'done')  return  r.raw_reading && r.raw_reading !== '';
    return true;
  });

  const list = document.getElementById('content');
  if (rows.length === 0) {
    list.innerHTML = `<div class="state-box"><div style="font-size:40px">✅</div>
      <div style="color:var(--text2)">ไม่มีรายการในหมวดนี้</div></div>`;
    return;
  }

  list.innerHTML = `<div class="meter-list">${rows.map(r => cardHtml(r)).join('')}</div>`;
}

function cardHtml(r) {
  const hasVal   = r.raw_reading !== '' && r.raw_reading !== undefined && r.raw_reading !== null;
  const isEdit   = editingId === r.meter_id;
  const valText  = hasVal ? `${r.raw_reading} ${r.raw_unit}` : '—';

  return `
  <div class="meter-card ${hasVal?'has-value':'no-value'} ${isEdit?'editing':''}"
       id="card_${CSS.escape(r.meter_id)}">
    <div class="meter-head" onclick="toggleEdit('${escHtml(r.meter_id)}','${escHtml(r.raw_unit||'kWh')}')">
      <div class="meter-sort">${r.sort_order}</div>
      <div class="meter-info">
        <div class="meter-name">${escHtml(r.building_name)}</div>
        <div class="meter-id-tag">${escHtml(r.meter_id)}</div>
      </div>
      <div class="meter-value-badge">
        ${hasVal
          ? `<span class="badge filled">✓</span><div style="font-size:11px;color:var(--text2);margin-top:4px;text-align:right">${escHtml(valText)}</div>`
          : `<span class="badge empty">ว่าง</span>`}
      </div>
    </div>
    <div class="meter-input-area ${isEdit?'open':''}" id="area_${CSS.escape(r.meter_id)}">
      <div class="input-row">
        <input class="value-input" type="number" inputmode="decimal"
          id="val_${CSS.escape(r.meter_id)}"
          placeholder="กรอกค่า meter"
          value="${escHtml(String(r.raw_reading||''))}"
          onkeydown="if(event.key==='Enter') saveRow('${escHtml(r.meter_id)}')">
        <div class="unit-toggle">
          <button class="unit-btn ${(r.raw_unit||'kWh')==='kWh'?'active':''}"
            id="ukwh_${CSS.escape(r.meter_id)}"
            onclick="setUnit('${escHtml(r.meter_id)}','kWh')">kWh</button>
          <button class="unit-btn ${r.raw_unit==='MWh'?'active':''}"
            id="umwh_${CSS.escape(r.meter_id)}"
            onclick="setUnit('${escHtml(r.meter_id)}','MWh')">MWh</button>
        </div>
      </div>
      <div class="extra-row">
        <input class="extra-input" type="text" placeholder="ชื่อผู้อ่าน (ถ้าต่างจากข้างบน)"
          id="rdr_${CSS.escape(r.meter_id)}"
          value="${escHtml(r.reader||'')}">
        <input class="extra-input" type="text" placeholder="หมายเหตุ"
          id="note_${CSS.escape(r.meter_id)}"
          value="${escHtml(r.note||'')}">
      </div>
      <button class="btn-save" id="savebtn_${CSS.escape(r.meter_id)}"
        onclick="saveRow('${escHtml(r.meter_id)}')">💾 บันทึก</button>
    </div>
  </div>`;
}

// ── Toggle card open/close ─────────────────────────────────
function toggleEdit(meterId, defaultUnit) {
  if (editingId === meterId) {
    editingId = null;
  } else {
    editingId = meterId;
    // set default unit ถ้า unit ว่าง
    setTimeout(() => {
      const row = allRows.find(r => r.meter_id === meterId);
      if (row && !row.raw_unit) setUnit(meterId, defaultUnit);
      // auto-fill reader name
      const globalReader = document.getElementById('globalReader').value;
      const rdrInput = document.getElementById(`rdr_${CSS.escape(meterId)}`);
      if (rdrInput && !rdrInput.value && globalReader) rdrInput.value = globalReader;
    }, 50);
  }
  renderList();
  if (editingId) {
    setTimeout(() => {
      const el = document.getElementById(`val_${CSS.escape(meterId)}`);
      if (el) el.focus();
    }, 100);
  }
}

function setUnit(meterId, unit) {
  const row = allRows.find(r => r.meter_id === meterId);
  if (row) row.raw_unit = unit;
  const kwh = document.getElementById(`ukwh_${CSS.escape(meterId)}`);
  const mwh = document.getElementById(`umwh_${CSS.escape(meterId)}`);
  if (kwh) kwh.classList.toggle('active', unit === 'kWh');
  if (mwh) mwh.classList.toggle('active', unit === 'MWh');
}

// ── Save single row ────────────────────────────────────────
async function saveRow(meterId) {
  const valEl  = document.getElementById(`val_${CSS.escape(meterId)}`);
  const rdrEl  = document.getElementById(`rdr_${CSS.escape(meterId)}`);
  const noteEl = document.getElementById(`note_${CSS.escape(meterId)}`);
  const btn    = document.getElementById(`savebtn_${CSS.escape(meterId)}`);

  const raw_reading = valEl ? valEl.value.trim() : '';
  const row = allRows.find(r => r.meter_id === meterId);
  const raw_unit    = row ? (row.raw_unit || 'kWh') : 'kWh';
  const reader      = rdrEl  ? rdrEl.value.trim()  : '';
  const note        = noteEl ? noteEl.value.trim() : '';

  if (btn) { btn.textContent = '⏳ กำลังบันทึก…'; btn.classList.add('saving'); }

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' }, // Apps Script CORS workaround
      body: JSON.stringify({
        action: 'update',
        week_id: weekId,
        meter_id: meterId,
        raw_reading,
        raw_unit,
        reader,
        note,
      })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'บันทึกไม่สำเร็จ');

    // อัปเดต local state
    if (row) {
      row.raw_reading = raw_reading;
      row.raw_unit    = raw_unit;
      row.reader      = reader;
      row.note        = note;
    }
    editingId = null;
    renderList();
    showToast('✅ บันทึกแล้ว', 'success');
  } catch(e) {
    if (btn) { btn.textContent = '💾 บันทึก'; btn.classList.remove('saving'); }
    showToast('❌ ' + e.message, 'error');
  }
}

// ── Export to GitHub ───────────────────────────────────────
async function exportToGitHub() {
  const done   = allRows.filter(r => r.raw_reading && r.raw_reading !== '').length;
  const remain = allRows.length - done;
  const msg    = remain > 0
    ? `ยังมี ${remain} รายการที่ยังไม่กรอก\nต้องการ push ขึ้น GitHub เลยไหม?`
    : `บันทึกครบทุกรายการแล้ว\nยืนยัน push ขึ้น GitHub?`;
  if (!confirm(msg)) return;

  const fab = document.getElementById('fabExport');
  fab.classList.add('exporting');
  fab.innerHTML = '<span>⏳</span> กำลัง push…';

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'export', week_id: weekId })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'export ไม่สำเร็จ');
    showToast('☁️ Push ไป GitHub สำเร็จ', 'success');
  } catch(e) {
    showToast('❌ ' + e.message, 'error');
  } finally {
    fab.classList.remove('exporting');
    fab.innerHTML = '<span>☁️</span> บันทึกลง GitHub';
  }
}

// ── Filter ────────────────────────────────────────────────
function setFilter(f, el) {
  filter = f;
  editingId = null;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

// ── Stats ─────────────────────────────────────────────────
function updateStats() {
  const total  = allRows.length;
  const done   = allRows.filter(r => r.raw_reading !== '' && r.raw_reading !== undefined && r.raw_reading !== null).length;
  const remain = total - done;
  document.getElementById('statTotal').textContent  = total;
  document.getElementById('statDone').textContent   = done;
  document.getElementById('statRemain').textContent = remain;
}

// ── UI helpers ────────────────────────────────────────────
function showLoading() {
  document.getElementById('content').innerHTML =
    `<div class="state-box"><div class="spinner"></div><div style="color:var(--text2)">กำลังโหลด ${weekId}…</div></div>`;
}

function showError(msg) {
  document.getElementById('content').innerHTML =
    `<div class="state-box"><div style="font-size:40px">⚠️</div>
     <div style="color:var(--red)">${escHtml(msg)}</div>
     <button class="btn-load" onclick="loadWeek()">ลองใหม่</button></div>`;
}

let toastTimer;
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
